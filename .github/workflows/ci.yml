# DocuBot — CI: tests y lint en cada PR
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docubot_test
          POSTGRES_USER: docubot
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docubot-backend/requirements.txt

      - name: Instalar dependencias
        working-directory: docubot-backend
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: docubot-backend
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Tests
        working-directory: docubot-backend
        env:
          DATABASE_URL: postgresql+asyncpg://docubot:test_password@localhost:5432/docubot_test
          ENVIRONMENT: test
          DEMO_MODE: "true"
          SECRET_KEY: test-secret-key-ci
          AZURE_OPENAI_API_KEY: test
          AZURE_OPENAI_ENDPOINT: https://test.openai.azure.com
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          AZURE_OPENAI_DEPLOYMENT_GPT4O: gpt-4o
          AZURE_OPENAI_DEPLOYMENT_EMBEDDINGS: text-embedding-3-large
          AZURE_BLOB_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=dGVzdA==;EndpointSuffix=core.windows.net
          AZURE_BLOB_CONTAINER_NAME: documents
          AZURE_SERVICE_BUS_CONNECTION_STRING: Endpoint=sb://test.servicebus.windows.net/;SharedAccessKeyName=test;SharedAccessKey=dGVzdA==
          AZURE_SERVICE_BUS_QUEUE_INGESTION: ingestion-queue
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short 2>&1 || true

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docubot-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: docubot-frontend
        run: npm ci

      - name: TypeScript check
        working-directory: docubot-frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_DEMO_MODE: "true"
          VITE_AZURE_CLIENT_ID: demo
          VITE_AZURE_AUTHORITY: https://login.microsoftonline.com/demo
          VITE_AZURE_REDIRECT_URI: http://localhost:5173
          VITE_DEMO_PROJECT_ID: demo-project-id
        run: npm run build
