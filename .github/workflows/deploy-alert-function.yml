# DocuBot — Deploy Azure Function (alert job timer)
name: Deploy Alert Function

on:
  push:
    branches: [main]
    paths:
      - "docubot-alert-function/**"
      - ".github/workflows/deploy-alert-function.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: docubot-alert-fn
          package: docubot-alert-function
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
