# DocuBot — Deploy backend a Azure Container Apps
# Trigger: push a main en docubot-backend/
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "docubot-backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: docubot-backend
  CONTAINER_APP_NAME: docubot-backend
  RESOURCE_GROUP: rg-docubot-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push imagen Docker
        run: |
          docker build \
            --file docubot-backend/Dockerfile \
            --tag $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --tag $REGISTRY/$IMAGE_NAME:latest \
            docubot-backend/
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Deploy a Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verificar health check
        run: |
          sleep 30
          curl -f ${{ secrets.BACKEND_URL }}/health || exit 1
