# DocuBot — Alembic configuration
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# La URL se sobreescribe desde env.py con settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/docubot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
