# DocuBot — Railway config (raíz del repo)
# Apunta al backend FastAPI en docubot-backend/

[build]
builder = "DOCKERFILE"
dockerfilePath = "docubot-backend/Dockerfile.prod"
buildContext = "docubot-backend"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/data"
